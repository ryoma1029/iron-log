<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>IRON LOG</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --text-dim: #666;
    --border: #2a2a3a;
    --red: #ff4444;
    --green: #44ff88;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; overflow: hidden; }
  
  /* SCREENS */
  .screen { display: none; flex-direction: column; height: 100vh; overflow: hidden; animation: fadeIn .25s ease; }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* HEADER */
  .header { padding: 16px 20px 10px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: var(--accent); }
  .header-sub { font-size: 11px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
  .back-btn { background: none; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer; padding: 4px 8px; }

  /* SCROLL CONTENT */
  .content { flex: 1; overflow-y: auto; padding: 0 16px 100px; -webkit-overflow-scrolling: touch; }

  /* BOTTOM NAV */
  .bottom-nav { display: flex; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .nav-btn { flex: 1; padding: 12px 8px; background: none; border: none; color: var(--text-dim); font-size: 9px; font-family: 'Noto Sans JP', sans-serif; letter-spacing: 1px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color .2s; }
  .nav-btn .icon { font-size: 20px; }
  .nav-btn.active { color: var(--accent); }

  /* CARDS */
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; }
  .card-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .card-title { font-size: 13px; font-weight: 700; letter-spacing: 1px; }
  .card-body { padding: 14px 16px; }

  /* BUTTONS */
  .btn { border: none; border-radius: 8px; padding: 12px 20px; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; cursor: pointer; transition: all .15s; font-size: 13px; letter-spacing: 1px; }
  .btn-primary { background: var(--accent); color: #0a0a0f; }
  .btn-primary:active { transform: scale(.97); background: #d4e83f; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:active { transform: scale(.97); }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:active { background: var(--border); }
  .btn-full { width: 100%; }
  .btn-complete { background: linear-gradient(135deg, var(--accent2), #ff3366); color: #fff; font-size: 15px; padding: 18px; border-radius: var(--radius); font-family: 'Bebas Neue', sans-serif; letter-spacing: 3px; font-size: 18px; }

  /* INPUTS */
  .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .input-group { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .input-label { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
  input[type=number], input[type=text], select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; padding: 10px 12px; width: 100%; outline: none; transition: border-color .2s; -webkit-appearance: none; }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  /* TAGS */
  .tag { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: 1px; }
  .tag-chest { background: #ff634722; color: #ff6347; border: 1px solid #ff634744; }
  .tag-back { background: #4169e122; color: #6495ed; border: 1px solid #6495ed44; }
  .tag-legs { background: #32cd3222; color: #7cfc00; border: 1px solid #7cfc0044; }
  .tag-shoulders { background: #ffd70022; color: #ffd700; border: 1px solid #ffd70044; }
  .tag-arms { background: #da70d622; color: #da70d6; border: 1px solid #da70d644; }
  .tag-other { background: #80808022; color: #aaa; border: 1px solid #aaa4; }

  /* SET LIST */
  .set-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .set-num { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--text-dim); width: 28px; }
  .set-data { flex: 1; font-size: 13px; }
  .set-data span { color: var(--accent); font-weight: 700; }
  .set-delete { background: none; border: none; color: var(--red); font-size: 18px; cursor: pointer; padding: 4px; }

  /* EXERCISE ITEM IN LOG */
  .exercise-item { padding: 12px; background: var(--surface2); border-radius: 8px; margin-bottom: 8px; }
  .exercise-item-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .exercise-name { font-weight: 700; font-size: 13px; }
  .exercise-meta { font-size: 11px; color: var(--text-dim); }
  .prev-record { font-size: 10px; color: var(--accent); background: #e8ff4711; border: 1px solid #e8ff4733; border-radius: 4px; padding: 3px 8px; margin-top: 4px; display: inline-block; }

  /* HISTORY */
  .history-day { margin-bottom: 16px; }
  .history-day-header { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 2px solid var(--border); margin-bottom: 10px; }
  .history-day-num { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--accent); line-height: 1; }
  .history-day-info { flex: 1; }
  .history-day-label { font-size: 12px; font-weight: 700; letter-spacing: 1px; }
  .history-day-date { font-size: 10px; color: var(--text-dim); }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-card { background: var(--surface2); border-radius: var(--radius); padding: 14px; border: 1px solid var(--border); }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; margin-top: 4px; }

  /* PROGRESS BARS */
  .progress-wrap { margin-bottom: 14px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; }
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .5s ease; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: #0009; z-index: 100; align-items: flex-end; }
  .modal-overlay.open { display: flex; animation: fadeIn .2s ease; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-height: 80vh; overflow-y: auto; border-top: 1px solid var(--border); }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; margin-bottom: 16px; }

  /* SECTION TITLES */
  .section-title { font-size: 10px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; margin: 16px 0 10px; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 13px; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* BADGE */
  .badge { background: var(--accent); color: #000; border-radius: 10px; padding: 2px 7px; font-size: 10px; font-weight: 700; }

  /* COMPLETE ANIMATION */
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
  .btn-complete:active { transform: scale(.97); }

  /* CHIP SELECT */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .chip { padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); font-size: 12px; cursor: pointer; transition: all .15s; }
  .chip.selected { border-color: var(--accent); color: var(--accent); background: #e8ff4714; }

  /* TOAST */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--accent); color: #000; padding: 10px 20px; border-radius: 30px; font-weight: 700; font-size: 13px; z-index: 200; opacity: 0; transition: all .3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* VOLUME CHART */
  .vol-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; padding: 0 4px; }
  .vol-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
  .vol-bar { width: 100%; border-radius: 4px 4px 0 0; background: linear-gradient(to top, var(--accent2), var(--accent)); min-height: 4px; transition: height .5s ease; }
  .vol-bar-label { font-size: 9px; color: var(--text-dim); }
</style>
</head>
<body>

<!-- SCREEN: LOG (ジムで使う) -->
<div class="screen active" id="screen-log">
  <div class="header">
    <div>
      <div class="logo">IRON LOG</div>
      <div class="header-sub" id="log-date-label">トレーニング記録</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:11px;color:var(--text-dim)" id="session-part-display">部位未選択</div>
      <div style="font-size:10px;color:var(--text-dim)" id="session-exercise-count">0 種目</div>
    </div>
  </div>
  <div class="content">
    <!-- 部位選択 -->
    <div class="section-title">今日の部位</div>
    <div class="chips" id="part-chips">
      <div class="chip" data-part="胸" onclick="selectPart(this)">🔴 胸</div>
      <div class="chip" data-part="背中" onclick="selectPart(this)">🔵 背中</div>
      <div class="chip" data-part="脚" onclick="selectPart(this)">🟢 脚</div>
      <div class="chip" data-part="肩" onclick="selectPart(this)">🟡 肩</div>
      <div class="chip" data-part="腕・腹" onclick="selectPart(this)">🟣 腕・腹</div>
      <div class="chip" data-part="その他" onclick="selectPart(this)">⚪ その他</div>
    </div>

    <!-- 種目追加 -->
    <div class="section-title">種目を追加</div>
    <div class="card">
      <div class="card-body">
        <div class="input-group" style="margin-bottom:10px">
          <div class="input-label">種目名（過去から選ぶ）</div>
          <select id="ex-name-select" onchange="onSelectExercise(this)">
            <option value="">-- タップして選択 --</option>
          </select>
          <div class="input-label" style="margin-top:8px">または新しい種目を入力</div>
          <input type="text" id="ex-name" placeholder="例：ベンチプレス" autocomplete="off" autocorrect="off" autocapitalize="off">
        </div>
        <!-- 前回記録表示 -->
        <div id="prev-hint" style="display:none" class="prev-record"></div>
        <div class="input-row" style="margin-top:10px">
          <div class="input-group">
            <div class="input-label">重量 (kg)</div>
            <input type="tel" id="ex-weight" placeholder="40" inputmode="decimal">
          </div>
          <div class="input-group">
            <div class="input-label">回数</div>
            <input type="tel" id="ex-reps" placeholder="10" inputmode="numeric">
          </div>
          <div class="input-group">
            <div class="input-label">セット数</div>
            <input type="tel" id="ex-sets" placeholder="3" inputmode="numeric">
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn btn-ghost" style="flex:1" onclick="addSet()">+ 1セット追加</button>
          <button class="btn btn-primary" style="flex:1" onclick="addExercise()">✓ 種目確定</button>
        </div>
      </div>
    </div>

    <!-- セット一覧（今入力中の種目） -->
    <div id="current-sets-wrap" style="display:none">
      <div class="section-title">入力中のセット</div>
      <div class="card">
        <div class="card-body" id="current-sets-list"></div>
      </div>
    </div>

    <!-- 今日の種目リスト -->
    <div id="today-exercises-wrap" style="display:none">
      <div class="section-title">今日の種目 <span class="badge" id="ex-count-badge">0</span></div>
      <div id="today-exercise-list"></div>
    </div>

    <!-- 完遂ボタン -->
    <div style="margin-top:8px">
      <button class="btn btn-complete btn-full" onclick="completeWorkout()">🏁 トレーニング完遂</button>
    </div>
  </div>
</div>

<!-- SCREEN: HISTORY (帰宅後見る) -->
<div class="screen" id="screen-history">
  <div class="header">
    <div class="logo">HISTORY</div>
    <div style="font-size:11px;color:var(--text-dim)" id="history-total-label">0 days</div>
  </div>
  <div class="content" id="history-content">
    <div class="empty"><div class="empty-icon">📋</div>記録がまだありません</div>
  </div>
</div>

<!-- SCREEN: STATS -->
<div class="screen" id="screen-stats">
  <div class="header">
    <div class="logo">STATS</div>
    <div style="font-size:11px;color:var(--text-dim)">分析</div>
  </div>
  <div class="content" id="stats-content">
    <div class="empty"><div class="empty-icon">📊</div>データが溜まると表示されます</div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav" id="main-nav">
  <button class="nav-btn active" id="nav-log" onclick="switchScreen('log')">
    <span class="icon">💪</span>記録
  </button>
  <button class="nav-btn" id="nav-history" onclick="switchScreen('history')">
    <span class="icon">📋</span>履歴
  </button>
  <button class="nav-btn" id="nav-stats" onclick="switchScreen('stats')">
    <span class="icon">📊</span>分析
  </button>
</div>

<!-- MODAL: Complete confirmation -->
<div class="modal-overlay" id="complete-modal">
  <div class="modal">
    <div class="modal-title">🏁 トレーニング完遂！</div>
    <div style="font-size:13px;color:var(--text-dim);margin-bottom:16px" id="complete-summary"></div>
    <button class="btn btn-primary btn-full" style="margin-bottom:10px" onclick="saveWorkout()">✅ 保存して終了</button>
    <button class="btn btn-ghost btn-full" onclick="closeModal()">キャンセル</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== GAS API =====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxbP8PlP_BMGlgbNj4AET9lVVMqSetMdDrdMlfs0xXoeKVa1zRdswztCl7_9HNzvxTs/exec';

async function syncToSheet(workout) {
  try {
    const encoded = encodeURIComponent(JSON.stringify(workout));
    const url = GAS_URL + '?action=write&data=' + encoded;
    const res = await fetch(url);
    const json = await res.json();
    console.log('sync result:', json);
  } catch(e) {
    console.warn('シート同期失敗:', e);
  }
}

// ===== DATA LAYER =====
const STORAGE_KEY = 'ironlog_v2';
let state = {
  workouts: [], // [{id, date, part, exercises:[{name,sets:[{weight,reps}]}], note}]
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
  // Seed with provided data if empty
  if (state.workouts.length === 0) seedData();
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function seedData() {
  const seed = [
    { id: 1, date: '2026-02-28', part: '胸', exercises: [
      { name: 'ベンチプレス', sets: [{w:20,r:10},{w:25,r:10},{w:30,r:10},{w:35,r:10},{w:40,r:6},{w:30,r:10},{w:20,r:10}] },
      { name: 'チェストプレス', sets: [{w:21,r:10},{w:28,r:10},{w:28,r:9}] },
      { name: 'ペクトラルフライ', sets: [{w:21,r:10},{w:28,r:10},{w:28,r:10}] },
    ]},
    { id: 2, date: '2026-03-01', part: '背中', exercises: [
      { name: 'ラットプルダウン', sets: [{w:35,r:10},{w:42,r:10},{w:42,r:10}] },
      { name: 'シーテッドロウ', sets: [{w:42,r:10},{w:42,r:10},{w:42,r:10}] },
      { name: 'リアデルトイド', sets: [{w:21,r:10},{w:21,r:10},{w:21,r:10}] },
    ]},
    { id: 3, date: '2026-03-02', part: '脚', exercises: [
      { name: 'スクワット', sets: [{w:60,r:10},{w:50,r:10},{w:50,r:5},{w:40,r:5}] },
      { name: 'ブルガリアンSQ', sets: [{w:14,r:10},{w:14,r:10},{w:14,r:10}] },
      { name: 'レッグプレス', sets: [{w:51,r:10},{w:51,r:10},{w:51,r:10}] },
      { name: 'カーフプレス', sets: [{w:30,r:50},{w:30,r:50}] },
    ]},
    { id: 4, date: '2026-03-03', part: '肩', exercises: [
      { name: 'ミリタリープレス', sets: [{w:40,r:10},{w:40,r:7},{w:35,r:8}] },
      { name: 'アーノルドプレス', sets: [{w:8,r:10},{w:10,r:10},{w:10,r:8}] },
      { name: 'サイドレイズ', sets: [{w:7,r:10},{w:5,r:10},{w:5,r:8},{w:2,r:30}] },
      { name: 'リアフライ', sets: [{w:3,r:10},{w:3,r:10},{w:3,r:10},{w:3,r:10},{w:3,r:14}] },
    ]},
    { id: 5, date: '2026-03-04', part: '腕・腹', exercises: [
      { name: 'OHエクステンション', sets: [{w:12,r:10},{w:12,r:10},{w:12,r:10}] },
      { name: 'アブドミナル', sets: [{w:42,r:10},{w:49,r:10},{w:49,r:10}] },
      { name: 'トーソローテーション', sets: [{w:42.5,r:10},{w:50,r:10},{w:50,r:10}] },
    ]},
    { id: 6, date: '2026-03-05', part: '胸', exercises: [
      { name: 'ダンベルプレス', sets: [{w:12,r:10},{w:12,r:10},{w:24,r:10}] },
      { name: 'チェストプレス', sets: [{w:42,r:10},{w:42,r:5},{w:35,r:10}] },
      { name: 'ペクトラルフライ', sets: [{w:35,r:10},{w:35,r:10},{w:28,r:11}] },
      { name: '足上げベンチ', sets: [{w:35,r:8},{w:30,r:8},{w:20,r:10}] },
      { name: 'プルオーバー', sets: [{w:12,r:10},{w:16,r:10},{w:16,r:10}] },
    ]},
  ];
  state.workouts = seed;
  saveState();
}

// ===== SESSION STATE =====
let session = {
  part: null,
  exercises: [], // [{name, sets:[{w,r}]}]
  pendingSets: [], // sets being built for current exercise
};

// ===== UI HELPERS =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function switchScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'stats') renderStats();
}
function closeModal() {
  document.getElementById('complete-modal').classList.remove('open');
}

// ===== PART & SUGGESTIONS =====
function selectPart(chip) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  chip.classList.add('selected');
  session.part = chip.dataset.part;
  document.getElementById('session-part-display').textContent = session.part;
  updateSuggestions();
}

function updateSuggestions() {
  const name = document.getElementById('ex-name').value.trim();
  showPrevHint(name);
  const names = getAllExerciseNames(session.part);
  const sel = document.getElementById('ex-name-select');
  const current = sel.value;
  sel.innerHTML = '<option value="">-- タップして選択 --</option>' +
    names.map(n => `<option value="${n}" ${n===current?'selected':''}>${n}</option>`).join('');
}

function onSelectExercise(sel) {
  if (!sel.value) return;
  document.getElementById('ex-name').value = sel.value;
  showPrevHint(sel.value);
}

function getAllExerciseNames(part) {
  const set = new Set();
  state.workouts.forEach(w => {
    if (!part || w.part === part) w.exercises.forEach(e => set.add(e.name));
  });
  return [...set];
}

function showPrevHint(name) {
  const hint = document.getElementById('prev-hint');
  if (!name) { hint.style.display = 'none'; return; }
  const prev = getPrevRecord(name);
  if (!prev) { hint.style.display = 'none'; return; }
  const maxSet = prev.sets.reduce((a,b) => (b.w > a.w ? b : a), prev.sets[0]);
  hint.style.display = 'inline-block';
  hint.textContent = `📌 前回: 最大 ${maxSet.w}kg × ${maxSet.r}回 (${prev.sets.length}セット)`;
}

function getPrevRecord(name) {
  for (let i = state.workouts.length - 1; i >= 0; i--) {
    const ex = state.workouts[i].exercises.find(e => e.name === name);
    if (ex) return ex;
  }
  return null;
}

// ===== SET / EXERCISE MANAGEMENT =====
function addSet() {
  const w = parseFloat(document.getElementById('ex-weight').value);
  const r = parseInt(document.getElementById('ex-reps').value);
  if (!w || !r) { showToast('重量と回数を入力してください'); return; }
  session.pendingSets.push({w, r});
  renderPendingSets();
  showToast(`Set ${session.pendingSets.length} 追加 ✓`);
}

function renderPendingSets() {
  const wrap = document.getElementById('current-sets-wrap');
  const list = document.getElementById('current-sets-list');
  if (session.pendingSets.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  list.innerHTML = session.pendingSets.map((s, i) => `
    <div class="set-item">
      <div class="set-num">${i+1}</div>
      <div class="set-data"><span>${s.w}kg</span> × <span>${s.r}回</span></div>
      <button class="set-delete" onclick="deleteSet(${i})">✕</button>
    </div>
  `).join('');
}

function deleteSet(i) {
  session.pendingSets.splice(i, 1);
  renderPendingSets();
}

function addExercise() {
  const name = document.getElementById('ex-name').value.trim();
  const w = parseFloat(document.getElementById('ex-weight').value);
  const r = parseInt(document.getElementById('ex-reps').value);
  const s = parseInt(document.getElementById('ex-sets').value);

  let sets = [...session.pendingSets];

  // If sets field used (quick mode)
  if (sets.length === 0 && w && r && s) {
    for (let i = 0; i < s; i++) sets.push({w, r});
  }

  if (!name) { showToast('種目名を入力してください'); return; }
  if (sets.length === 0) { showToast('セットを追加してください'); return; }

  session.exercises.push({ name, sets });
  session.pendingSets = [];
  renderPendingSets();
  renderTodayExercises();

  // Reset inputs
  document.getElementById('ex-name').value = '';
  document.getElementById('ex-weight').value = '';
  document.getElementById('ex-reps').value = '';
  document.getElementById('ex-sets').value = '';
  document.getElementById('prev-hint').style.display = 'none';
  document.getElementById('session-exercise-count').textContent = session.exercises.length + ' 種目';
  showToast(`「${name}」追加 ✓`);
}

function renderTodayExercises() {
  const wrap = document.getElementById('today-exercises-wrap');
  const list = document.getElementById('today-exercise-list');
  if (session.exercises.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  document.getElementById('ex-count-badge').textContent = session.exercises.length;
  list.innerHTML = session.exercises.map((ex, i) => {
    const maxW = Math.max(...ex.sets.map(s => s.w));
    const totalVol = ex.sets.reduce((a, s) => a + s.w * s.r, 0);
    const prev = getPrevRecord(ex.name);
    let prevHTML = '';
    if (prev) {
      const prevMax = Math.max(...prev.sets.map(s => s.w));
      const diff = maxW - prevMax;
      prevHTML = `<div style="font-size:10px;color:${diff > 0 ? 'var(--green)' : diff < 0 ? 'var(--red)' : 'var(--text-dim)'}">
        ${diff > 0 ? '▲' : diff < 0 ? '▼' : '—'} 前回比 ${diff > 0 ? '+' : ''}${diff}kg
      </div>`;
    }
    return `
      <div class="exercise-item">
        <div class="exercise-item-head">
          <div class="exercise-name">${ex.name}</div>
          <button onclick="removeExercise(${i})" style="background:none;border:none;color:var(--red);font-size:14px;cursor:pointer">✕</button>
        </div>
        <div class="exercise-meta">${ex.sets.length}セット・最大${maxW}kg・Vol ${totalVol}kg</div>
        ${prevHTML}
        <div style="font-size:10px;color:var(--text-dim);margin-top:4px">${ex.sets.map((s,j)=>`S${j+1}:${s.w}×${s.r}`).join(' / ')}</div>
      </div>
    `;
  }).join('');
}

function removeExercise(i) {
  session.exercises.splice(i, 1);
  renderTodayExercises();
  document.getElementById('session-exercise-count').textContent = session.exercises.length + ' 種目';
}

// ===== COMPLETE =====
function completeWorkout() {
  if (session.exercises.length === 0) { showToast('種目がありません'); return; }
  const totalSets = session.exercises.reduce((a, e) => a + e.sets.length, 0);
  const totalVol = session.exercises.reduce((a, e) => a + e.sets.reduce((b, s) => b + s.w * s.r, 0), 0);
  document.getElementById('complete-summary').innerHTML = `
    <strong>${session.part || '部位未選択'}</strong> ・ ${session.exercises.length}種目 ・ ${totalSets}セット<br>
    総ボリューム: <strong style="color:var(--accent)">${totalVol.toLocaleString()} kg</strong>
  `;
  document.getElementById('complete-modal').classList.add('open');
}

function saveWorkout() {
  const now = new Date();
  const dateStr = now.toISOString().split('T')[0];
  const id = Date.now();
  state.workouts.push({
    id,
    date: dateStr,
    part: session.part || 'その他',
    exercises: session.exercises.map(e => ({
      name: e.name,
      sets: e.sets.map(s => ({w: s.w, r: s.r}))
    }))
  });
  saveState();
  closeModal();

  // スプレッドシートに同期
  const saved = state.workouts[state.workouts.length - 1];
  syncToSheet(saved).then(() => showToast('🎉 記録を保存＆シート同期完了！'));

  // Reset session
  session = { part: null, exercises: [], pendingSets: [] };
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('session-part-display').textContent = '部位未選択';
  document.getElementById('session-exercise-count').textContent = '0 種目';
  document.getElementById('today-exercises-wrap').style.display = 'none';
  document.getElementById('current-sets-wrap').style.display = 'none';
  document.getElementById('today-exercise-list').innerHTML = '';
  showToast('📤 シートに同期中...');
}

// ===== HISTORY =====
function partTag(part) {
  const map = { '胸':'chest','背中':'back','脚':'legs','肩':'shoulders','腕・腹':'arms' };
  const cls = map[part] || 'other';
  return `<span class="tag tag-${cls}">${part}</span>`;
}

function renderHistory() {
  const el = document.getElementById('history-content');
  const ws = [...state.workouts].reverse();
  document.getElementById('history-total-label').textContent = ws.length + ' days';
  if (ws.length === 0) { el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>記録がまだありません</div>'; return; }
  el.innerHTML = ws.map((w, idx) => {
    const dayNum = state.workouts.length - idx;
    const totalSets = w.exercises.reduce((a, e) => a + e.sets.length, 0);
    const totalVol = w.exercises.reduce((a, e) => a + e.sets.reduce((b, s) => b + s.w * s.r, 0), 0);
    const exList = w.exercises.map(e => {
      const maxW = Math.max(...e.sets.map(s => s.w));
      return `<div class="exercise-item" style="margin-bottom:6px">
        <div class="exercise-item-head">
          <div class="exercise-name">${e.name}</div>
          <div class="exercise-meta">${e.sets.length}s・最大${maxW}kg</div>
        </div>
        <div style="font-size:10px;color:var(--text-dim)">${e.sets.map((s,j)=>`S${j+1}:${s.w}×${s.r}`).join(' / ')}</div>
      </div>`;
    }).join('');
    return `
      <div class="history-day">
        <div class="history-day-header">
          <div class="history-day-num">D${state.workouts.length - idx}</div>
          <div class="history-day-info">
            <div class="history-day-label">${partTag(w.part)} ${w.part}</div>
            <div class="history-day-date">${w.date} ・ ${w.exercises.length}種目 ・ ${totalSets}セット</div>
            <div style="font-size:10px;color:var(--accent);margin-top:2px">Vol: ${totalVol.toLocaleString()}kg</div>
          </div>
        </div>
        ${exList}
      </div>
    `;
  }).join('');
}

// ===== STATS =====
function renderStats() {
  const el = document.getElementById('stats-content');
  if (state.workouts.length === 0) { el.innerHTML = '<div class="empty"><div class="empty-icon">📊</div>データが溜まると表示されます</div>'; return; }

  const totalDays = state.workouts.length;
  const totalSets = state.workouts.reduce((a, w) => a + w.exercises.reduce((b, e) => b + e.sets.length, 0), 0);
  const totalVol = state.workouts.reduce((a, w) => a + w.exercises.reduce((b, e) => b + e.sets.reduce((c, s) => c + s.w * s.r, 0), 0), 0);
  const totalExercises = state.workouts.reduce((a, w) => a + w.exercises.length, 0);

  // Part distribution
  const partCount = {};
  state.workouts.forEach(w => partCount[w.part] = (partCount[w.part]||0) + 1);
  const partMax = Math.max(...Object.values(partCount));

  // Per-exercise max weight history (top 5 exercises)
  const exMap = {};
  state.workouts.forEach(w => {
    w.exercises.forEach(e => {
      if (!exMap[e.name]) exMap[e.name] = [];
      exMap[e.name].push(Math.max(...e.sets.map(s => s.w)));
    });
  });
  const topEx = Object.entries(exMap).sort((a,b) => b[1].length - a[1].length).slice(0, 6);

  // Volume per workout for chart
  const volData = state.workouts.slice(-7).map(w => ({
    label: 'D' + (state.workouts.indexOf(w)+1),
    vol: w.exercises.reduce((a, e) => a + e.sets.reduce((b, s) => b + s.w * s.r, 0), 0)
  }));
  const volMax = Math.max(...volData.map(d => d.vol));

  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value">${totalDays}</div><div class="stat-label">TRAINING DAYS</div></div>
      <div class="stat-card"><div class="stat-value">${totalSets}</div><div class="stat-label">TOTAL SETS</div></div>
      <div class="stat-card"><div class="stat-value">${(totalVol/1000).toFixed(1)}t</div><div class="stat-label">TOTAL VOLUME</div></div>
      <div class="stat-card"><div class="stat-value">${totalExercises}</div><div class="stat-label">EXERCISES</div></div>
    </div>

    <div class="section-title">ボリューム推移（直近7回）</div>
    <div class="card"><div class="card-body">
      <div class="vol-chart">
        ${volData.map(d => `
          <div class="vol-bar-wrap">
            <div class="vol-bar" style="height:${volMax > 0 ? Math.max(8, (d.vol/volMax)*68) : 4}px"></div>
            <div class="vol-bar-label">${d.label}</div>
          </div>
        `).join('')}
      </div>
    </div></div>

    <div class="section-title">部位別トレーニング回数</div>
    <div class="card"><div class="card-body">
      ${Object.entries(partCount).map(([p, c]) => `
        <div class="progress-wrap">
          <div class="progress-label"><span>${p}</span><span style="color:var(--accent)">${c}回</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${(c/partMax)*100}%"></div></div>
        </div>
      `).join('')}
    </div></div>

    <div class="section-title">種目別 最大重量</div>
    <div class="card"><div class="card-body">
      ${topEx.map(([name, weights]) => {
        const maxW = Math.max(...weights);
        const prev = weights.length > 1 ? weights[weights.length-2] : null;
        const diff = prev !== null ? (maxW - prev) : null;
        return `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
            <div>
              <div style="font-size:12px;font-weight:700">${name}</div>
              <div style="font-size:10px;color:var(--text-dim)">${weights.length}回記録</div>
            </div>
            <div style="text-align:right">
              <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent)">${maxW}kg</div>
              ${diff !== null ? `<div style="font-size:10px;color:${diff>0?'var(--green)':diff<0?'var(--red)':'var(--text-dim)'}">${diff>0?'▲':'▼'} ${Math.abs(diff)}kg</div>` : ''}
            </div>
          </div>
        `;
      }).join('')}
    </div></div>
  `;
}

// ===== INIT =====
function init() {
  loadState();
  const today = new Date().toLocaleDateString('ja-JP', { month:'long', day:'numeric', weekday:'short' });
  document.getElementById('log-date-label').textContent = today;

  document.getElementById('ex-name').addEventListener('input', function() {
    showPrevHint(this.value.trim());
  });
}

init();
</script>
</body>
</html>
